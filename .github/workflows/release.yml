name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows (GUI Only)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build

      - name: Build CLI
        run: cmake --build build --target chunkgen_offline --config Release

      - name: Build GUI
        run: cmake --build build --target mcchunkgen-gui --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path mcchunkgen-windows
          Copy-Item "build/Release/chunkgen_offline.exe" -Destination "mcchunkgen-windows/" -ErrorAction SilentlyContinue
          Copy-Item "build/Release/mcchunkgen-gui.exe" -Destination "mcchunkgen-windows/" -ErrorAction SilentlyContinue
          Copy-Item "build/chunkgen_offline.exe" -Destination "mcchunkgen-windows/" -ErrorAction SilentlyContinue
          Copy-Item "build/mcchunkgen-gui.exe" -Destination "mcchunkgen-windows/" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "gui/webui" -Destination "mcchunkgen-windows/gui/" -ErrorAction SilentlyContinue
          Copy-Item "README.md" -Destination "mcchunkgen-windows/" -ErrorAction SilentlyContinue
          Compress-Archive -Path mcchunkgen-windows -DestinationPath mcchunkgen-windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcchunkgen-windows
          path: mcchunkgen-windows.zip

  build-linux:
    name: Linux (GUI + CLI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq g++ cmake

      - name: Configure CMake
        run: cmake -B build

      - name: Build CLI
        run: cmake --build build --target chunkgen_offline

      - name: Build GUI
        run: cmake --build build --target mcchunkgen-gui

      - name: Package
        run: |
          mkdir -p mcchunkgen-linux/gui/webui
          cp build/chunkgen_offline mcchunkgen-linux/ 2>/dev/null || true
          cp build/mcchunkgen-gui mcchunkgen-linux/ 2>/dev/null || true
          cp -r gui/webui/* mcchunkgen-linux/gui/webui/
          cp README.md mcchunkgen-linux/
          tar czf mcchunkgen-linux.tar.gz mcchunkgen-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcchunkgen-linux
          path: mcchunkgen-linux.tar.gz

  create-release:
    name: Create Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: McChunkGen ${{ github.ref_name }}
          body: |
            ## McChunkGen ${{ github.ref_name }}

            Pre-built binaries for Windows and Linux. No compile step needed.

            ### Downloads
            - **Windows**: `mcchunkgen-windows.zip` (CLI + GUI + web UI)
            - **Linux**: `mcchunkgen-linux.tar.gz` (CLI + GUI + web UI)

            ### What's included
            - `chunkgen_offline` — CLI chunk generator (CPU mode, SIMD)
            - `mcchunkgen-gui` — HTTP server + auto-opens browser
            - Full web UI: Generator, Inspector, Benchmark, Compress, Server tabs

            ### Quick start
            1. Extract the archive
            2. Double-click `mcchunkgen-gui` to open the web UI
            3. Or run `chunkgen_offline --help` from terminal

            ### Build from source (with CUDA)
            Requires CUDA toolkit and CMake.
            ```bash
            cmake -B build
            cmake --build build
            ```
          files: |
            mcchunkgen-windows/mcchunkgen-windows.zip
            mcchunkgen-linux/mcchunkgen-linux.tar.gz
          draft: false
          prerelease: false