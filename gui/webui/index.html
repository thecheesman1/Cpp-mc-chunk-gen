<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mcchunkgen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <!-- Sidebar -->
    <nav id="sidebar">
        <div class="brand">
            <svg class="brand-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
                <rect x="2" y="2" width="6" height="6" rx="1" fill="currentColor" opacity="0.6"/>
                <rect x="12" y="2" width="6" height="6" rx="1" fill="currentColor"/>
                <rect x="2" y="12" width="6" height="6" rx="1" fill="currentColor"/>
                <rect x="12" y="12" width="6" height="6" rx="1" fill="currentColor" opacity="0.6"/>
            </svg>
            <span class="brand-text">mcchunkgen</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="generator">
                <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M8 2L10 6L14 7L11 10L12 14L8 12L4 14L5 10L2 7L6 6L8 2Z"/>
                </svg>
                <span class="nav-label">Generator</span>
            </button>
            <button class="nav-tab" data-tab="inspector">
                <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <circle cx="7" cy="7" r="4.5"/>
                    <path d="M10.5 10.5L14 14"/>
                </svg>
                <span class="nav-label">Inspector</span>
            </button>
            <button class="nav-tab" data-tab="benchmark">
                <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="10" width="3" height="4"/>
                    <rect x="6.5" y="6" width="3" height="8"/>
                    <rect x="11" y="2" width="3" height="12"/>
                </svg>
                <span class="nav-label">Benchmark</span>
            </button>
            <button class="nav-tab" data-tab="compress">
                <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 1H8L13 5V15H3V1Z"/>
                    <path d="M8 1V5H13"/>
                    <path d="M6 9H10M6 11H10"/>
                </svg>
                <span class="nav-label">Compress</span>
            </button>
            <button class="nav-tab" data-tab="server">
                <svg class="nav-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="12" height="4" rx="1"/>
                    <rect x="2" y="10" width="12" height="4" rx="1"/>
                    <circle cx="5" cy="4" r="1" fill="currentColor"/>
                    <circle cx="5" cy="12" r="1" fill="currentColor"/>
                </svg>
                <span class="nav-label">Server</span>
            </button>
        </div>
        <div class="nav-footer">
            <span class="version">v0.1.0</span>
        </div>
    </nav>

    <!-- Main content -->
    <main id="content">
        <div id="tab-generator" class="tab-content active">
            <div class="tab-header">
                <h1>Generator</h1>
                <p class="tab-desc">Generate chunks for your Minecraft world</p>
            </div>
            <div id="generator-root"></div>
        </div>
        <div id="tab-inspector" class="tab-content">
            <div class="tab-header">
                <h1>Inspector</h1>
                <p class="tab-desc">Open .mca region files and inspect chunk data</p>
            </div>
            <div id="inspector-root"></div>
        </div>
        <div id="tab-benchmark" class="tab-content">
            <div class="tab-header">
                <h1>Benchmark</h1>
                <p class="tab-desc">Measure generation performance</p>
            </div>
            <div id="benchmark-root"></div>
        </div>
        <div id="tab-compress" class="tab-content">
            <div class="tab-header">
                <h1>Compress</h1>
                <p class="tab-desc">Test compression methods on region files</p>
            </div>
            <div id="compress-root"></div>
        </div>
        <div id="tab-server" class="tab-content">
            <div class="tab-header">
                <h1>Server</h1>
                <p class="tab-desc">Start/stop the Minecraft server and view logs</p>
            </div>
            <div id="server-root"></div>
        </div>
    </main>
</div>

<script src="app.js"></script>
<script src="tabs/generator.js"></script>
<script src="tabs/inspector.js"></script>
<script src="tabs/benchmark.js"></script>
<script src="tabs/compress.js"></script>
<script src="tabs/server.js"></script>
</body>
</html>
